name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests (API)
        run: pnpm test
        env:
          SKIP_DB: "true"

      - name: Build
        run: pnpm build:all
        env:
          SKIP_DB: "true"

      - name: Install Playwright Chromium
        run: pnpm --filter @follstack/web exec playwright install chromium --with-deps

      - name: E2E smoke
        run: pnpm test:e2e
        env:
          CI: "true"
          SKIP_DB: "true"
          NEXT_PUBLIC_API_URL: http://localhost:3001
          CORS_ORIGIN: http://localhost:3000
