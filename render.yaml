# follStack API on Render
#
# In the Render dashboard for this service, set:
#   Build Command:  pnpm install --frozen-lockfile && pnpm --filter @follstack/api build
#   Start Command:  pnpm start
# (or leave blank after this Blueprint sync — root package.json start is API-only)
#
# Do NOT hardcode PORT. Keep HOST=0.0.0.0.
# Redeploy the LATEST commit on main (not an old SHA).

services:
  - type: web
    name: follstack-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @follstack/api build
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: '22.14.0'
      - key: HOST
        value: 0.0.0.0
      - key: SKIP_DB
        value: 'true'
      - key: ALLOW_START_WITHOUT_DB
        value: 'true'
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://follstack.netlify.app
      - key: OPENAI_API_KEY
        sync: false
