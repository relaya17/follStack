# Site-level Netlify settings for apps/web (set Package directory = apps/web in UI).
# Paths below are relative to the repository root (Base directory = /).

[build]
  command = "pnpm --filter @follstack/web build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"
