# follStack — Next.js (App Router) on Netlify from a pnpm monorepo
#
# CRITICAL — Netlify UI Build settings (Site configuration → Build & deploy):
#   Base directory:     LEAVE EMPTY  (do NOT set apps/web)
#   Package directory:  apps/web     (recommended) OR leave empty
#   Build command:      (leave empty — uses this file)
#   Publish directory:  apps/web/.next
#
# Then: Deploys → Trigger deploy → Clear cache and deploy site

[build]
  command = "pnpm --filter @follstack/shared --filter @follstack/ui --filter @follstack/web build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "22"
  PNPM_FLAGS = "--shamefully-hoist"
  NEXT_TELEMETRY_DISABLED = "1"

# Required: without this plugin Netlify publishes .next as static files → site-wide 404
[[plugins]]
  package = "@netlify/plugin-nextjs"
